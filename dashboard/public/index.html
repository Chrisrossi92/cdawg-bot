<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cdawg Bot Dashboard</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="header">
        <div>
          <h1>Cdawg Bot Dashboard</h1>
          <p>Local operational panel for health, settings, and metrics.</p>
        </div>
        <form id="api-config-form" class="api-config">
          <label>
            API Base URL
            <input id="api-base-url" name="apiBaseUrl" type="url" value="http://127.0.0.1:8787" />
          </label>
          <button type="submit">Connect</button>
        </form>
      </header>

      <section class="panel">
        <div class="panel-header">
          <h2>Health</h2>
          <button id="refresh-health" type="button">Refresh</button>
        </div>
        <pre id="health-output">Loading...</pre>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Settings</h2>
          <button id="refresh-settings" type="button">Refresh</button>
        </div>
        <form id="settings-form" class="settings-form">
          <label>
            Passive Chat Enabled
            <select name="passiveEnabled">
              <option value="true">On</option>
              <option value="false">Off</option>
            </select>
          </label>
          <label>
            Trigger Chance
            <input name="triggerChance" type="number" min="0" max="1" step="0.01" />
          </label>
          <label>
            Global Cooldown (ms)
            <input name="globalCooldownMs" type="number" min="1000" step="1000" />
          </label>
          <label>
            Channel Cooldown (ms)
            <input name="channelCooldownMs" type="number" min="1000" step="1000" />
          </label>
          <label>
            Quiet Gap (ms)
            <input name="quietChannelThresholdMs" type="number" min="1000" step="1000" />
          </label>
          <label>
            Conversation Threshold
            <input name="conversationNudgeMessageThreshold" type="number" min="1" step="1" />
          </label>
          <label>
            Provider Logging
            <select name="providerLoggingEnabled">
              <option value="true">On</option>
              <option value="false">Off</option>
            </select>
          </label>
          <div class="settings-actions">
            <button type="submit">Save Settings</button>
            <span id="settings-status"></span>
          </div>
        </form>
        <pre id="settings-output">Loading...</pre>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Metrics</h2>
          <button id="refresh-metrics" type="button">Refresh</button>
        </div>
        <pre id="metrics-output">Loading...</pre>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
